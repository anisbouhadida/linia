<main class="container-fluid min-vh-100 d-flex align-items-center justify-content-center bg-body text-body p-3">
  <section
    class="col-12 col-sm-8 col-md-5 col-lg-4 border rounded bg-body-tertiary p-4"
    aria-labelledby="login-title"
  >
    <p class="small text-body-secondary font-monospace text-uppercase mb-2">Linia Command</p>
    <h1 id="login-title" class="h4 mb-4">Operator login</h1>
    <form class="d-grid gap-3" [formGroup]="form" (ngSubmit)="submit()">
      <label class="form-label small text-body-secondary mb-0" for="email">Email</label>
      <input
        id="email"
        type="email"
        formControlName="email"
        autocomplete="username"
        class="form-control"
      />

      <label class="form-label small text-body-secondary mb-0" for="password">Password</label>
      <input
        id="password"
        type="password"
        formControlName="password"
        autocomplete="current-password"
        class="form-control"
      />

      @if (errorMessage()) {
        <p class="text-danger-emphasis mb-0" role="alert">{{ errorMessage() }}</p>
      }

      <button
        class="btn btn-primary d-inline-flex align-items-center justify-content-center gap-2"
        type="submit"
        [disabled]="isSubmitting()"
      >
        <i class="bi bi-box-arrow-in-right" aria-hidden="true"></i>
        Sign in
      </button>
    </form>
  </section>
</main>
