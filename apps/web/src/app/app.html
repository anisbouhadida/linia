<div class="min-vh-100 d-flex flex-column bg-body text-body">
  <header class="navbar border-bottom bg-body-tertiary px-3 py-2">
    <a class="navbar-brand font-monospace fw-semibold text-uppercase text-body" routerLink="/planning">Linia</a>
    @if (currentUser(); as user) {
      <div class="d-flex align-items-center gap-2 min-w-0">
        <span class="small text-body-secondary text-truncate">{{ user.displayName }}</span>
        <button
          class="btn btn-sm btn-outline-secondary d-inline-flex align-items-center gap-1"
          type="button"
          (click)="logout()"
        >
          <i class="bi bi-box-arrow-right" aria-hidden="true"></i>
          Log out
        </button>
      </div>
    }
  </header>
  <main class="flex-grow-1 p-3">
    <router-outlet />
  </main>
</div>
